name: Test

on:
  push:
  pull_request:


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: |
        go mod download
        cd web && pnpm install
        cd ..

    - name: Build web
      run: cd web && npx rsbuild build && cd ..

    - name: Run tests
      run: make test
